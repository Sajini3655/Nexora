# =========================
# SERVER
# =========================
spring.config.import=optional:file:.env[.properties]
server.port=8081

# =========================
# DATABASE (Supabase Postgres)
# =========================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.wmrlgibwjpxotxwtwgvx.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# HIKARI
# =========================
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Run pre-JPA SQL cleanup scripts against cloud DB
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# =========================
# JWT
# =========================
jwt.secret=${JWT_SECRET:change-this-to-a-long-secure-random-string}
jwt.expiration=86400000

# =========================
# LOGGING
# =========================
logging.level.org.springframework.security=INFO
logging.level.com.admin=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# =========================
# MAIL (GMAIL SMTP)
# =========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.mail.from=${MAIL_FROM:}

# =========================
# FRONTEND URL
# =========================
app.frontend.base-url=${FRONTEND_URL:http://localhost:5173}

# =========================
# BOOTSTRAP ADMIN
# =========================
app.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:true}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@nexora.com}
app.bootstrap-admin.name=${BOOTSTRAP_ADMIN_NAME:Admin User}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:admin123}

# =========================
# ACTUATOR / SYSTEM HEALTH
# =========================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.endpoints.web.base-path=/actuator

# =========================
# DASHBOARD HEALTH PROBES
# =========================
dashboard.refresh-interval-seconds=10
app.ai-service.health-url=http://localhost:8000/health
app.ai-service.timeout-ms=2000