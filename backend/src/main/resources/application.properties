# Server
server.port=8081

# ✅ Database (H2 file DB for easy local running)
# This avoids installing PostgreSQL just to run the demo.
spring.datasource.url=jdbc:h2:file:./data/nexora-db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=change-this-to-a-long-secure-random-string
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.admin=DEBUG

# Optional email settings
# ✅ Provide a local/dummy mail sender so the app can start even if you don't
# configure real SMTP. (Mail failures are caught in MailService.)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# app.mail.from=noreply@nexora.local

# Frontend base URL used inside invite emails (if you enable mail)
app.frontend.base-url=http://localhost:5173

# ================== NLQ (Groq) ==================
# Set this in your environment for security:
#   - Windows PowerShell:  $env:GROQ_API_KEY="..."
#   - macOS/Linux:        export GROQ_API_KEY="..."
# Then map it here.
groq.api-key=${GROQ_API_KEY:}
groq.base-url=https://api.groq.com/openai/v1
groq.model=llama-3.3-70b-versatile